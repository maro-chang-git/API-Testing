<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Test Cases</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header>
  <h1>API Test Cases</h1>
  <span id="api-meta">Select a Swagger to begin</span>
</header>

<div class="toolbar">
  <div class="toolbar-group">
    <label>Swagger</label>
    <select id="f-swagger">
      <option value="">— Select API —</option>
    </select>
  </div>
  <div class="toolbar-group">
    <label>Tag / Group</label>
    <select id="f-tag" disabled>
      <option value="">All Tags</option>
    </select>
  </div>
  <div class="toolbar-group">
    <label>Endpoint</label>
    <select id="f-endpoint" disabled style="min-width:260px;">
      <option value="">— Select Endpoint —</option>
    </select>
  </div>

  <div class="toolbar-divider"></div>

  <div class="toolbar-group">
    <label>Auth Status</label>
    <select id="f-auth">
      <option value="">All</option>
      <option value="valid">Valid</option>
      <option value="missing">Missing</option>
      <option value="invalid">Invalid</option>
      <option value="expired">Expired</option>
    </select>
  </div>
  <div class="toolbar-group">
    <label>Category</label>
    <select id="f-cat">
      <option value="">All</option>
      <option value="happy_path">Happy Path</option>
      <option value="auth">Auth</option>
      <option value="validation">Validation</option>
      <option value="error_handling">Error Handling</option>
      <option value="boundary">Boundary</option>
    </select>
  </div>
  <div class="toolbar-group">
    <label>Status Code</label>
    <select id="f-status">
      <option value="">All</option>
      <option value="2">2xx</option>
      <option value="4">4xx</option>
      <option value="5">5xx</option>
    </select>
  </div>
  <div class="toolbar-group">
    <input type="text" id="f-search" placeholder="Search purpose, notes…" style="width:190px;" />
  </div>

  <div class="toolbar-actions">
    <span class="count" id="count-label"></span>
    <button id="btn-export" style="display:none;">Export JSON</button>
  </div>
</div>

<div class="summary" id="summary-cards"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th data-col="id">ID <span class="sort-icon">↕</span></th>
        <th data-col="method">Method <span class="sort-icon">↕</span></th>
        <th data-col="endpoint">Endpoint <span class="sort-icon">↕</span></th>
        <th data-col="auth_status">Auth Status <span class="sort-icon">↕</span></th>
        <th data-col="category">Category <span class="sort-icon">↕</span></th>
        <th data-col="purpose">Purpose</th>
        <th data-col="expected_status">Expected Status <span class="sort-icon">↕</span></th>
        <th data-col="notes">Notes</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="no-results" id="no-results">Select a Tag and Endpoint to generate test cases</div>
</div>

<script type="module" src="scripts/app.js"></script>
</body>
</html>
